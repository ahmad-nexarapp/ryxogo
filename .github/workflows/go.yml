# Build and test RyxoGo.
# Docs: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        # No go.sum (RyxoGo has no external deps) — disable the module cache
        # to avoid the "Dependencies file is not found" warning.
        cache: false

    - name: Build (native)
      run: go build -v ./...

    - name: Build (WebAssembly)
      run: GOOS=js GOARCH=wasm go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Vet
      run: go vet ./...
